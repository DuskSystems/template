# https://embarkstudios.github.io/cargo-deny

[graph]
all-features = true
exclude-dev = true

# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "all"
yanked = "deny"

# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
confidence-threshold = 0.9
include-dev = true
unused-allowed-license = "deny"
allow = [
  "Apache-2.0",
  "MIT",
]

# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
allow-wildcard-paths = true
multiple-versions = "deny"
wildcards = "deny"
deny = [
  # Prefer `std` replacements
  { crate = "byteorder", use-instead = "*::from_le_bytes / *::from_be_bytes" },
  { crate = "home", use-instead = "std::env::home_dir" },
  { crate = "lazy_static", use-instead = "std::sync::LazyLock" },
  { crate = "num_cpus", use-instead = "std::thread::available_parallelism" },
  { crate = "once_cell", use-instead = "std::sync::OnceLock" },
  { crate = "pin-utils", use-instead = "std::pin::pin!" },
  { crate = "scopeguard", use-instead = "std::ops::Drop" },
  { crate = "static_assertions", use-instead = "const { assert!(...) }" },

  # Prefer lightweight alternatives
  { crate = "futures", use-instead = "futures-*" },
  { crate = "pin-project", use-instead = "pin-project-lite" },

  # Prefer native async
  { crate = "async-trait", use-instead = "async fn in trait" },
  { crate = "async-recursion", use-instead = "Box::pin" },

  # Prefer `rustls` ecosystem
  { crate = "native-tls", use-instead = "rustls" },
  { crate = "openssl", use-instead = "rustls" },
  { crate = "ring", use-instead = "aws-lc-rs" },
  { crate = "rustls-pemfile", use-instead = "rustls-pki-types" },
  { crate = "webpki-root-certs", use-instead = "rustls-platform-verifier" },
  { crate = "webpki-roots", use-instead = "rustls-platform-verifier" },
]

# Avoid "full" feature
[[bans.features]]
name = "tokio"
deny = ["full"]

# Avoid "full" feature
[[bans.features]]
name = "hyper"
deny = ["full"]

# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html#the-workspace-dependencies-field-optional
[bans.workspace-dependencies]
include-path-dependencies = true
duplicates = "deny"
unused = "allow" # Prefer `cargo-shear`

# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html#the-build-field-optional
[bans.build]
allow-build-scripts = []

# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-registry = "deny"
unknown-git = "deny"
unused-allowed-source = "deny"
allow-git = []
